services:
  cassandra:
    image: ${CASSANDRA_IMAGE:-cassandra:5.0}
    hostname: cassandra
    env_file:
      - .env
    environment:
      - CASSANDRA_CLUSTER_NAME=floodilka-cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra,192.168.0.87,192.168.0.191
      - MAX_HEAP_SIZE=4G
      - HEAP_NEWSIZE=800M
      - CASSANDRA_BROADCAST_ADDRESS=cassandra
      - CASSANDRA_LISTEN_ADDRESS=cassandra
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
      - CASSANDRA_AUTHENTICATOR=PasswordAuthenticator
      - CASSANDRA_AUTHORIZER=CassandraAuthorizer
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./conf/cassandra.yaml:/etc/cassandra/cassandra.yaml
      - ./conf/jvm-server.options:/etc/cassandra/jvm-server.options
    networks:
      - floodilka-shared
    ports:
      - target: 9042
        published: 9042
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 5G
    healthcheck:
      test: ['CMD-SHELL', 'nodetool statusbinary | grep -q running']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 100000
        hard: 100000
    cap_add:
      - IPC_LOCK

  cassandra-backup:
    image: ${CASSANDRA_BACKUP_IMAGE:-floodilka-cassandra-backup:latest}
    env_file:
      - /var/www/floodilka/.env
      - .env
    environment:
      - AGE_PUBLIC_KEY=age1agt86fuf292ee8qq3ef5yc6gnx2l3azp6hryy082l6ntx9gxd5hsuqg27v
      - AWS_S3_BUCKET=floodilka-bucket
      - AWS_S3_PREFIX=backups/cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra:ro
    networks:
      - floodilka-shared
    depends_on:
      - cassandra
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  floodilka-shared:
    external: true

volumes:
  cassandra_data:
    driver: local
