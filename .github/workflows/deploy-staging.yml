name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/floodilo

jobs:
  build-frontend:
    name: Build Frontend
    if: inputs.target == 'all' || inputs.target == 'frontend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/crates/libfluxcore

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: frontend/scripts/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          PUBLIC_PROJECT_ENV: stable
          PUBLIC_BUILD_SHA: ${{ github.sha }}
          PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
          PUBLIC_YANDEX_METRIKA_ID: '108307618'
          PUBLIC_SENTRY_DSN: 'https://9baf2c9bf1814480af078e9a34a8b8a26489d01632354b748e1424a9eb7e3077@k1.hawk.so/0'
        run: |
          export PUBLIC_BUILD_TIMESTAMP=$(date +%s)
          pnpm wasm:codegen
          pnpm generate:colors
          pnpm generate:masks
          pnpm generate:css-types
          npx lingui compile
          npx tsc --noEmit
          rm -rf dist
          npx rspack build --mode production
          npx tsx scripts/build-sw.mjs
          echo "{\"sha\":\"$PUBLIC_BUILD_SHA\",\"buildNumber\":$PUBLIC_BUILD_NUMBER,\"buildTimestamp\":\"$PUBLIC_BUILD_TIMESTAMP\"}" > dist/version.json

      - name: Upload sourcemaps to Hawk
        working-directory: frontend
        env:
          HAWK_INTEGRATION_TOKEN: ${{ secrets.HAWK_INTEGRATION_TOKEN }}
          PUBLIC_BUILD_SHA: ${{ github.sha }}
        run: node scripts/upload-sourcemaps.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-images:
    name: Build ${{ matrix.service }}
    if: inputs.target == 'all' || inputs.target == 'backend'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: floodilka-backend
          - service: gateway
            context: gateway
            dockerfile: gateway/Dockerfile
            image: floodilka-gateway
          - service: media-proxy
            context: media-proxy
            dockerfile: media-proxy/Dockerfile
            image: floodilka-media-proxy
          - service: admin
            context: admin
            dockerfile: admin/Dockerfile
            image: floodilka-admin
          - service: metrics
            context: metrics
            dockerfile: metrics/Dockerfile
            image: floodilka-metrics
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build timestamp
        id: meta
        run: echo "timestamp=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.service == 'admin' && format('BUILD_TIMESTAMP={0}', steps.meta.outputs.timestamp) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: [build-frontend, build-images]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        if: inputs.target == 'all' || inputs.target == 'frontend'
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host staging
            HostName ${{ secrets.STAGING_HOST }}
            User ${{ secrets.STAGING_USER }}
            IdentityFile ~/.ssh/deploy_key
            ControlMaster auto
            ControlPath /tmp/ssh-deploy-%C
            ControlPersist 5m
          EOF

      - name: Sync frontend dist
        if: inputs.target == 'all' || inputs.target == 'frontend'
        run: rsync -az --delete --exclude='desktop/' frontend-dist/ staging:/srv/frontend/

      - name: Sync devops configs
        run: rsync -az devops/ staging:/var/www/floodilka/devops/

      - name: Deploy frontend stack
        if: inputs.target == 'all' || inputs.target == 'frontend'
        run: ssh staging "docker stack deploy -c /var/www/floodilka/devops/frontend/compose.yaml frontend"

      - name: Pull images and deploy backend
        if: inputs.target == 'all' || inputs.target == 'backend'
        env:
          SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GATEWAY_ADMIN_SECRET: ${{ secrets.GATEWAY_ADMIN_SECRET }}
        run: |
          echo "$GITHUB_TOKEN" | ssh staging "docker login ghcr.io -u github-actions --password-stdin"

          for image in floodilka-backend floodilka-gateway floodilka-media-proxy floodilka-admin floodilka-metrics; do
            ssh staging "docker pull ghcr.io/floodilo/${image}:${SHA} && docker tag ghcr.io/floodilo/${image}:${SHA} ${image}:latest"
          done

          ssh staging "
            docker stack deploy -c /var/www/floodilka/devops/backend/compose.yaml backend &&
            docker stack deploy -c /var/www/floodilka/devops/media-proxy/compose.yaml media &&
            docker stack deploy -c /var/www/floodilka/devops/admin/compose.yaml admin &&
            docker stack deploy -c /var/www/floodilka/devops/metrics/compose.yaml metrics
          "

          # Gateway: apply config without triggering image-based restart
          ssh staging "docker stack deploy --resolve-image never -c /var/www/floodilka/devops/gateway/compose.yaml gateway"

          # Rolling update API (start-first, блокирующий)
          ssh staging "docker service update --image floodilka-backend:latest backend_api"

          # Rolling update Worker (stop-first, блокирующий)
          ssh staging "docker service update --image floodilka-backend:latest backend_worker"

          # Gateway hot reload (zero downtime, no restart)
          ssh staging "
            docker rm -f gw-extract 2>/dev/null || true &&
            docker create --name gw-extract floodilka-gateway:latest &&
            docker cp gw-extract:/opt/floodilka_gateway/lib/floodilka_gateway-0.0.0/ebin /tmp/gw-beams &&
            docker rm gw-extract &&
            CONTAINER_ID=\$(docker ps -q -f name=gateway_gateway --no-trunc | head -1) &&
            docker cp /tmp/gw-beams/. \$CONTAINER_ID:/opt/floodilka_gateway/lib/floodilka_gateway-0.0.0/ebin/ &&
            docker exec \$CONTAINER_ID curl -sf \
              -X POST http://localhost:8081/_admin/reload \
              -H 'Content-Type: application/json' \
              -H 'Authorization: Bearer ${GATEWAY_ADMIN_SECRET}' \
              -d '{}' &&
            rm -rf /tmp/gw-beams
          " || echo "Gateway hot reload skipped (container may have restarted from config change)"

          # Rolling update remaining services (start-first, parallel)
          ssh staging "docker service update --image floodilka-media-proxy:latest media_media --detach"
          ssh staging "docker service update --image floodilka-admin:latest admin_admin --detach"
          ssh staging "docker service update --image floodilka-metrics:latest metrics_metrics --detach"

      - name: Health checks
        run: |
          if [[ "${{ inputs.target }}" == "all" || "${{ inputs.target }}" == "backend" ]]; then
            echo "Checking API health..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://stage.floodilka.com/api/_health

            echo "Checking Media Proxy health..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://stage.floodilka.com/media/_health

            echo "Checking Gateway health..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://gateway.stage.floodilka.com/_health
          fi

          if [[ "${{ inputs.target }}" == "all" || "${{ inputs.target }}" == "frontend" ]]; then
            echo "Checking Frontend..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://stage.floodilka.com/
          fi

          echo ""
          echo "All health checks passed!"

      - name: Cleanup old images
        if: always()
        run: ssh staging "docker container prune -f && docker image prune -af" || true
