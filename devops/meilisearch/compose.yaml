services:
  meilisearch:
    image: getmeili/meilisearch:v1.23
    hostname: meilisearch
    env_file:
      - /etc/floodilka/meilisearch.env
    environment:
      - MEILI_ENV=production
      - MEILI_DB_PATH=/meili_data
      - MEILI_HTTP_ADDR=0.0.0.0:7700
      - MEILI_MAX_INDEXING_MEMORY=2gb
      - MEILI_MAX_INDEXING_THREADS=2
      - MEILI_LOG_LEVEL=INFO
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - floodilka-shared
    ports:
      - '7700:7700'
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:7700/health > /dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  floodilka-shared:
    external: true

volumes:
  meilisearch_data:
    driver: local
