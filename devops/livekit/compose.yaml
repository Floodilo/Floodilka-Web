services:
  valkey:
    image: valkey/valkey:7.2-alpine
    hostname: lk-valkey
    network_mode: host
    command: valkey-server /etc/valkey/valkey.conf
    volumes:
      - ./rendered/valkey.conf:/etc/valkey/valkey.conf:ro
      - valkey_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1280M
        reservations:
          cpus: '0.1'
          memory: 256M

  sentinel:
    image: valkey/valkey:7.2-alpine
    hostname: lk-sentinel
    network_mode: host
    command: valkey-sentinel /etc/valkey/sentinel.conf
    volumes:
      - ./rendered/sentinel.conf:/etc/valkey/sentinel.conf
    restart: unless-stopped
    depends_on:
      - valkey
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  livekit:
    image: livekit/livekit-server:v1.9.11
    hostname: livekit
    entrypoint: /entrypoint.sh
    network_mode: host
    dns:
      - 77.88.8.8
      - 77.88.8.1
    env_file:
      - .env
    volumes:
      - ./rendered/livekit.yaml:/etc/livekit.yaml:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    restart: unless-stopped
    depends_on:
      - sentinel
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 2G

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: floodilka-livekit-caddy:latest
    hostname: livekit-caddy
    entrypoint: /entrypoint-caddy.sh
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./caddy.yaml.template:/etc/caddy.yaml.template:ro
      - ./entrypoint-caddy.sh:/entrypoint-caddy.sh:ro
      - caddy_data:/data
    restart: unless-stopped

volumes:
  valkey_data:
  caddy_data:
