services:
  frontend:
    image: caddy:2-alpine
    volumes:
      - /srv/frontend:/srv/frontend:ro
      - /var/www/floodilka/devops/frontend/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - floodilka-shared
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.labels.role == infra
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: '1'
          memory: 4G
        reservations:
          cpus: '0.1'
          memory: 64M
      labels:
        caddy: floodilka.com
        caddy.reverse_proxy: '{{upstreams 8080}}'

networks:
  floodilka-shared:
    external: true
