services:
  gateway:
    image: floodilka-gateway:latest
    hostname: gateway
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc:
        soft: 65536
        hard: 65536
    environment:
      # RELEASE_NODE is computed by prod-entrypoint.sh from container IP
      # so each replica gets a unique distributed-Erlang name.
      - CLUSTER_NAME=floodilka_gateway
      - CLUSTER_DISCOVERY_DNS=tasks.gateway
      - NODE_COOKIE=floodilka_prod_cookie
      - LOGGER_LEVEL=info
      - FLOODILKA_API_HOST=api:8080
      - MEDIA_PROXY_ENDPOINT=https://floodilka.com/media
    env_file:
      - /var/www/floodilka/.env
    networks:
      - floodilka-shared
    stop_grace_period: 15s
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.role == gateway
        preferences:
          - spread: node.hostname
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 30s
        parallelism: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '2'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 1G
      labels:
        caddy_gw: gateway.floodilka.com
        caddy_gw.reverse_proxy: '{{upstreams 8080}}'
        caddy_gw.reverse_proxy.lb_policy: header Authorization
        caddy_gw.reverse_proxy.lb_try_duration: 30s
        caddy_gw.reverse_proxy.lb_retries: 5
        caddy_gw.reverse_proxy.health_uri: /_health
        caddy_gw.reverse_proxy.health_interval: 5s
        caddy_gw.reverse_proxy.health_timeout: 3s
        caddy_gw.reverse_proxy.transport: http
        caddy_gw.reverse_proxy.transport.dial_timeout: 1s
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/_health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  floodilka-shared:
    external: true
