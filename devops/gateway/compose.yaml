services:
  gateway:
    image: floodilka-gateway:latest
    hostname: gateway
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc:
        soft: 65536
        hard: 65536
    environment:
      # RELEASE_NODE is computed by prod-entrypoint.sh from the container IP so each
      # replica gets a unique distributed-Erlang name in a multi-node cluster.
      - CLUSTER_NAME=floodilka_gateway
      # CLUSTER_DISCOVERY_DNS will be set to "tasks.gateway" together with
      # endpoint_mode: dnsrr when we move to replicas > 1 in Phase 7 cutover.
      - NODE_COOKIE=floodilka_prod_cookie
      - LOGGER_LEVEL=info
      - FLOODILKA_API_HOST=api:8080
      - MEDIA_PROXY_ENDPOINT=https://floodilka.com/media
    env_file:
      - /var/www/floodilka/.env
    networks:
      - floodilka-shared
    stop_grace_period: 15s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      update_config:
        order: stop-first
        failure_action: rollback
        monitor: 15s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '2'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 1G
      labels:
        caddy_gw: gateway.floodilka.com
        caddy_gw.reverse_proxy: '{{upstreams 8080}}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/_health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  floodilka-shared:
    external: true
