services:
  livekit:
    image: livekit/livekit-server:latest
    hostname: livekit
    entrypoint: /entrypoint.sh
    network_mode: host
    dns:
      - 77.88.8.8
      - 77.88.8.1
    env_file:
      - .env
    volumes:
      - ./conf/livekit.yaml.template:/etc/livekit.yaml.template:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: floodilka-livekit-caddy:latest
    hostname: livekit-caddy
    entrypoint: /entrypoint-caddy.sh
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./caddy.yaml.template:/etc/caddy.yaml.template:ro
      - ./entrypoint-caddy.sh:/entrypoint-caddy.sh:ro
      - caddy_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
