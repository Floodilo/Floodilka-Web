services:
  api:
    image: floodilka-backend:latest
    hostname: api
    command: ['npx', 'tsx', 'src/App.ts']
    env_file:
      - /var/www/floodilka/.env
    volumes:
      - /var/www/secrets:/var/www/secrets:ro
      - /var/www/floodilka/backend/firebase-service-account.json:/var/www/floodilka/backend/firebase-service-account.json:ro
    networks:
      - floodilka-shared
    ports:
      - target: 8080
        published: 8080
        mode: host
    stop_grace_period: 30s
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.labels.role == backend
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '3'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        caddy: floodilka.com
        caddy.handle_path: /api/*
        caddy.handle_path.reverse_proxy: '{{upstreams 8080}}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/_ready > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    image: floodilka-backend:latest
    hostname: worker
    command: ['npx', 'tsx', 'src/worker/Worker.ts']
    env_file:
      - /var/www/floodilka/.env
    networks:
      - floodilka-shared
    stop_grace_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == worker
      update_config:
        order: stop-first
        failure_action: rollback
        monitor: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  floodilka-shared:
    external: true
