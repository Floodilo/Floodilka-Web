services:
  media:
    image: floodilka-media-proxy:latest
    hostname: media
    env_file:
      - /var/www/floodilka/.env
    networks:
      - floodilka-shared
    stop_grace_period: 15s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        caddy: floodilka.com
        caddy.handle_path: /media/*
        caddy.handle_path.reverse_proxy: '{{upstreams 8080}}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/_health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  floodilka-shared:
    external: true
