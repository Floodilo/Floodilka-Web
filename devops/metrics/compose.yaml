services:
  metrics:
    image: floodilka-metrics:latest
    hostname: metrics
    env_file:
      - /var/www/floodilka/.env
    environment:
      - METRICS_PORT=8080
      - METRICS_MODE=clickhouse
      - BUFFER_FLUSH_INTERVAL_SECS=30
    networks:
      - floodilka-shared
    stop_grace_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 5s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/_health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  floodilka-shared:
    external: true
