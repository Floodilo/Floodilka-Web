services:
  admin:
    image: floodilka-admin:latest
    hostname: admin
    environment:
      - NETDATA_PROD_URL=http://91.197.98.25:19999
      - NETDATA_LIVEKIT_URL=http://89.104.74.144:19999
    env_file:
      - /var/www/floodilka/.env
    networks:
      - floodilka-shared
    stop_grace_period: 15s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      labels:
        caddy: floodilka.com
        caddy.handle_path: /admin*
        caddy.handle_path.reverse_proxy: '{{upstreams 8080}}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/admin/_health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  floodilka-shared:
    external: true
